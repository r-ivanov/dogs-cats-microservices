name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'

    - name: Build dogs-service
      run: |
        cd dogs-service
        mvn clean verify

    - name: Build cats-service
      run: |
        cd cats-service
        mvn clean verify